# ============================================================
# Nagios Configuration for Fortis Bank
# File: /etc/nagios4/conf.d/fortis-bank.cfg
# ============================================================

# ── Define the host (your Ubuntu VM / server) ────────────────
define host {
    use                 linux-server
    host_name           fortis-bank-server
    alias               Fortis Bank Server
    address             127.0.0.1          ; Change to your Ubuntu VM IP
    max_check_attempts  3
    check_interval      5
    retry_interval      1
    notification_period 24x7
}

# ── Monitor Frontend (React App on port 30800) ───────────────
define service {
    use                 generic-service
    host_name           fortis-bank-server
    service_description Fortis Frontend App
    check_command       check_http!-p 30800 -u /
    check_interval      2
    retry_interval      1
    max_check_attempts  3
}

# ── Monitor Backend API (Node.js on port 30500) ──────────────
define service {
    use                 generic-service
    host_name           fortis-bank-server
    service_description Fortis Backend API
    check_command       check_http!-p 30500 -u /balance -s "balance"
    check_interval      2
    retry_interval      1
    max_check_attempts  3
}

# ── Monitor HTTP Response Time ────────────────────────────────
define service {
    use                 generic-service
    host_name           fortis-bank-server
    service_description HTTP Response Time
    check_command       check_http!-p 30800 -w 2 -c 5
    check_interval      5
}

# ── Monitor System: CPU Load ──────────────────────────────────
define service {
    use                 generic-service
    host_name           fortis-bank-server
    service_description CPU Load
    check_command       check_local_load!5.0,4.0,3.0!10.0,6.0,4.0
    check_interval      5
}

# ── Monitor System: Disk Space ────────────────────────────────
define service {
    use                 generic-service
    host_name           fortis-bank-server
    service_description Disk Space
    check_command       check_local_disk!20%!10%!/
    check_interval      10
}

# ── Monitor System: Memory ────────────────────────────────────
define service {
    use                 generic-service
    host_name           fortis-bank-server
    service_description Memory Usage
    check_command       check_local_mem!80!90
    check_interval      5
}
