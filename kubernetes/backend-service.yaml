apiVersion: v1
kind: Service
metadata:
  name: fortis-backend-service
  labels:
    app: fortis-bank
    tier: backend
spec:
  type: NodePort                    # Expose externally via node port
  selector:
    app: fortis-bank
    tier: backend
  ports:
  - protocol: TCP
    port: 5000           # Port inside the cluster
    targetPort: 5000     # Port on the container
    nodePort: 30500      # Port accessible from host machine (30000-32767)
